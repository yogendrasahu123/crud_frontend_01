<form class="container" >
    <div class="form-group" >
<label for="name">Name</label>
<input type="text" class="form-control" [(ngModel)]="name" name="name" id="name" placeholder="name">
    </div>
    <div class="form-group">
      <label for="Email1">Email address</label>
      <input type="email" class="form-control" id="Email1"  [(ngModel)]="email"  name="email" placeholder="Enter email">
    
    </div>
    <div class="form-group">
      <label for="phone">Phone:</label>
      <input type="tel" class="form-control" id="phone"  [(ngModel)]="phone"  name="phone" placeholder="phone">
    </div>
    
    <div class="form-group">
        <label for="address">Address:</label>
        <input type="text" class="form-control" id="address"  [(ngModel)]="address"  name="address" placeholder="address">
      </div>
      

    <button type="submit" *ngIf="isUpdate==true" (click)="submit()" class="btn btn-primary">Submit</button>
    <button type="reset" *ngIf="isUpdate==false" (click)="update()" class="btn btn-secondary">Update</button>
  </form>

  
  
<br>
  <table  class="table table-bordered container" *ngIf="submitedData.length>0">
    <thead>
      <tr>
        <th scope="col">Name</th>
        <th scope="col">Email</th>
        <th scope="col">Phone</th>
        <th scope="col">Addrss</th>
        <th scope="col">Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let data of submitedData;let i=index" >
        <td >{{data.name}}</td>
        <td>{{data.email}}</td>
        <td>{{data.phone}} </td>
        <td>{{data.address}}</td>
        <button type="submit" class="btn btn-danger" (click)="delete(i)" >Delete </button>&nbsp; &nbsp; 
        <button type="submit" class="btn btn-warning" (click)="editDetail()" >Edit</button> 
      </tr>
