<div class="container mt-1">
  <nav class="navbar navbar-light bg-primary">
    <div class="container-fluid">
      <h1 style="color: aliceblue">Angular Crud</h1>
      <div class="d-flex">
        <button class="btn btn-success mb-2" (click)="toggleForm()">
          Add Employee
        </button>
      </div>
    </div>
  </nav>

  <!-- Employee Form -->
  <div *ngIf="showForm" class="card p-3 mb-3">
    <form>
      <div class="mb-2">
        <label>First Name</label>
        <input
          type="text"
          placeholder="Enter First Name"
          class="form-control"
          [(ngModel)]="fname"
          name="fname"
          maxlength="10"
          required
        />
      </div>
      <div class="mb-2">
        <label>Last Name</label>
        <input
          type="text"
          placeholder="Enter Last Name"
          class="form-control"
          [(ngModel)]="lname"
          name="lname"
          required
          maxlength="10"
        />
      </div>
      <div class="mb-2">
        <label>Email</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          required
          email
        />
      </div>
      <div class="mb-2">
        <label>Phone Number</label>
        <input
          type="tel"
          class="form-control"
          [(ngModel)]="number"
          name="number"
          required
        />
      </div>
      <div class="mb-2">
        <label>Salary</label>
        <input
          type="number"
          class="form-control"
          [(ngModel)]="salary"
          name="salary"
          required
        />
      </div>
      <div class="mb-2">
        <label for="dob">Date Of Birth</label>
        <input
          type="date"
          id="dob"
          class="form-control"
          [(ngModel)]="dob"
          name="dob"
        />
      </div>
      <div class="mb-2">
        <label for="course"> Select Your course </label>
        <select
          name="course"
          id="course"
          class="form-control"
          name="course"
          [(ngModel)]="course"
        >
          <option value="">Angular</option>
          <option value="Javascript">Javascript</option>
          <option value="Reactjs">Reactjs</option>
          <option value="vuejs">vuejs</option>
        </select>
      </div>
      <div mb-2>
        <input
          type="checkbox"
          id="checkbox1"
          name="checkbox1"
          [(ngModel)]="checkbox1"
        />
        &nbsp;
        <label for="checkbox1">All Information are true</label>
      </div>

      <div class="mt-3">
        <button *ngIf="!isUpdate" class="btn btn-primary" (click)="Add()">
          Submit
        </button>
        <button *ngIf="isUpdate" class="btn btn-warning" (click)="update()">
          Update
        </button>
        <button class="btn btn-secondary ms-2" (click)="cancelForm()">
          Cancel
        </button>
      </div>
    </form>
  </div>

  <!-- Employee Table -->
  <table class="table table-bordered" *ngIf="addedData.length > 0">
    <thead class="table-dark">
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Mobile No.</th>
        <th>Salary</th>
        <th>Dob</th>
        <th>Course</th>

        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let data of addedData; let i = index">
        <td>{{ data.fname }}</td>
        <td>{{ data.lname }}</td>
        <td>{{ data.email }}</td>
        <td>{{ data.number }}</td>
        <td>{{ data.salary }}</td>
        <td>{{ data.dob | date : "dd-MM-yyyy" }}</td>
        <td>{{ data.course }}</td>
        <td>
          <button class="btn btn-info btn-sm me-2" (click)="editDetails(data)">
            Edit
          </button>
          <button class="btn btn-danger btn-sm" (click)="deleteData(i)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
