<div class="container mt-1">
    <nav class="navbar navbar-light bg-secondary">
        <div class="container-fluid">
            <h1 style="color: aliceblue">Angular CRUD</h1>
            <div class="d-flex">
                <button class="btn btn-warning mb-2" (click)="openForm()">
                    Add Employee
                </button>
            </div>
        </div>
    </nav>


    <!-- Table -->
    <table class="table table-bordered   " >
        <thead class="table-dark">
            <tr>
                <th>Sr. No.</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Mobile No.</th>
                <th>Salary</th>
                <th>DOB</th>
                <th>Course</th>

                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let data of employeeList;let i=index">
                <td>{{ i+1 }}</td>
                <td>{{ data.first_name }}</td>
                <td>{{ data.last_name }}</td>
                <td>{{ data.email_id }}</td>
                <td>{{ data.phone_no }}</td>
                <td>{{ data.salary }}</td>
                <td>{{ data.dob | date : "dd-MM-yyyy" }}</td>
                <td>{{ data.course }}</td>

                <td>
                    <div class="action_key">
                        <button class="btn btn-info btn-sm" (click)="editEmp(data)">
                            Edit
                        </button>

                        <button (click)="deleteEmp(data)" class="btn btn-danger btn-sm">
                            Delete
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>


<div class="modal fade" id="bootstrapModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="staticBackdropLabel">Modal title</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="card p-3 mb-3">
                    <form>
                        <div class="mb-1">
                            <label>First Name</label><span class="danger">*</span>
                            <input type="text" placeholder="Enter First Name" class="form-control" [(ngModel)]="fname"
                                name="fname" maxlength="10" required />
                        </div>
                        <div class="mb-1">
                            <label>Last Name</label><span class="danger">*</span>
                            <input type="text" placeholder="Enter Last Name" class="form-control" [(ngModel)]="lname"
                                name="lname" required maxlength="10" />
                        </div>
                        <div class="mb-1">
                            <label>Email</label><span class="danger">*</span>
                            <input type="email" class="form-control" [(ngModel)]="email" name="email" required
                                placeholder="Enter Email Address" />
                        </div>
                        <div class="mb-1">
                            <label>Phone Number</label><span class="danger">*</span>
                            <input type="tel" class="form-control" [(ngModel)]="phone_number" name="phone_number"
                                required placeholder="Enter Phone Phone Number" />
                        </div>
                        <div class="mb-1">
                            <label>Salary</label><span class="danger">*</span>
                            <input type="number" class="form-control" [(ngModel)]="salary" name="salary" required
                                placeholder="Enter Your Salary" />
                        </div>
                        <div class="mb-1">
                            <label for="dob">Date Of Birth</label><span class="danger">*</span>
                            <input type="date" id="dob" class="form-control" [(ngModel)]="dob" name="dob" />
                        </div>
                        <div class="mb-1">
                            <label>Select Your Course</label><span class="danger">*</span>
                            <select name="course" class="form-control" [(ngModel)]="course">
                                <option value="">Angular</option>
                                <option value="Javascript">Javascript</option>
                                <option value="Reactjs">Reactjs</option>
                                <option value="vuejs">Vuejs</option>
                            </select>
                        </div>




                        <div class="mb-1">
                            <input type="checkbox" id="checkbox1" name="checkbox1" [(ngModel)]="checkbox1" />
                            &nbsp;
                            <label for="checkbox1">All Information are true</label><span class="danger">*</span>
                        </div>

                        <div class="mt-3">
                            <button *ngIf="!showUpdateBtn" type="button" class="btn btn-primary btn-sm"
                                (click)="submit()">Submit</button>
                            <button *ngIf="showUpdateBtn" type="button" class="btn btn-warning btn-sm"
                                (click)="update()"> Update</button>
                            <button type="button" class="btn btn-secondary ms-2 btn-sm">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
